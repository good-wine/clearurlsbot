# Speed up compilation with mold linker (disabled in this environment)
# [target.x86_64-unknown-linux-gnu]
# linker = "clang"
# rustflags = ["-C", "link-arg=--ld-path=/usr/local/bin/mold"]

# Parallel frontend (faster) - use all CPU cores
[build]
jobs = 8

# Use sparse registry protocol for faster dependency downloads
[registries.crates-io]
protocol = "sparse"

# Network settings
[net]
git-fetch-with-cli = true
retry = 3


