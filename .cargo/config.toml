# Speed up compilation with mold linker
[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=--ld-path=/usr/local/bin/mold"]

# Parallel frontend (faster)
[build]
jobs = 8

# Incremental compilation
[profile.dev]
incremental = true

# Use sparse registry protocol for faster dependency downloads
[registries.crates-io]
protocol = "sparse"
